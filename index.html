  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
    canvas { width: 100%; height: 250px; }
    .lab-setup { position: relative; width: 190px; height: 170px; margin: 12px auto 8px; }
    .hotplate { position: absolute; left: 22px; right: 22px; bottom: 8px; height: 22px; border-radius: 8px 8px 5px 5px; background: linear-gradient(#4b5563, #1f2937); box-shadow: 0 7px 0 #111827, 0 10px 16px rgba(15,23,42,.25); }
    .hotplate::after { content: ''; position: absolute; left: 28px; right: 28px; top: 5px; height: 6px; border-radius: 999px; background: #ef4444; box-shadow: 0 0 10px #fb7185; transition: opacity .25s, box-shadow .25s; }
    .hotplate.off::after { opacity: 0; box-shadow: none; }
    .beaker { position: absolute; left: 54px; top: 10px; width: 82px; height: 118px; border: 4px solid #64748b; border-top: 0; border-radius: 4px 4px 18px 18px; background: rgba(219,234,254,.32); clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%); overflow: hidden; }
    .ice-inside { position: absolute; z-index: 2; left: 18px; right: 18px; bottom: 8px; height: 50px; font-size: 22px; line-height: 1; transform-origin: center bottom; transition: opacity .2s, transform .25s; }
    .ice-inside span { position: absolute; display: block; }
    .ice-inside span:nth-child(1) { left: 0; bottom: 3px; transform: rotate(-8deg); }
    .ice-inside span:nth-child(2) { left: 23px; bottom: 0; transform: rotate(7deg); }
    .ice-inside span:nth-child(3) { left: 12px; bottom: 25px; transform: rotate(4deg); }
    .beaker::before { content: ''; position: absolute; left: -8px; right: -8px; top: 0; height: 8px; border: 4px solid #64748b; border-radius: 5px; background: rgba(255,255,255,.55); }
    .liquid { position: absolute; left: 7px; right: 7px; bottom: 6px; height: 58%; opacity: 0; border-radius: 3px 3px 14px 14px; background: linear-gradient(#bfdbfe, #60a5fa); transition: height .25s, opacity .25s; }
    .liquid::after { content: ''; position: absolute; left: 10px; right: 10px; top: 7px; height: 3px; border-radius: 50%; background: rgba(255,255,255,.65); }
    .steam { position: absolute; top: -4px; color: #94a3b8; font-size: 24px; letter-spacing: 8px; opacity: .7; }
    .particle-model { position: absolute; left: 10px; right: 10px; top: 12px; height: 98px; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .particle-model span { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: #cbd5e1; box-shadow: 0 0 8px rgba(148,163,184,.75); animation: particleFloat var(--particle-speed, 5.5s) ease-in-out infinite alternate; }
    .particle-model span:nth-child(1) { left: 4px; top: 76px; animation: pA var(--particle-speed, 5.5s) ease-in-out infinite alternate; }
    .particle-model span:nth-child(2) { left: 30px; top: 42px; animation: pB var(--particle-speed, 5.5s) ease-in-out infinite alternate; animation-delay: -1.4s; }
    .particle-model span:nth-child(3) { left: 58px; top: 70px; animation: pC var(--particle-speed, 5.5s) ease-in-out infinite alternate; }
    .particle-model span:nth-child(4) { left: 18px; top: 18px; animation: pB var(--particle-speed, 5.5s) ease-in-out infinite alternate; animation-delay: -2.1s; }
    .particle-model span:nth-child(5) { left: 70px; top: 32px; animation: pA var(--particle-speed, 5.5s) ease-in-out infinite alternate; animation-delay: -2.6s; }
    @keyframes pA { 0%{transform:translate(-16px,10px)}50%{transform:translate(12px,-14px)}100%{transform:translate(-12px,8px)} }
    @keyframes pB { 0%{transform:translate(14px,-10px)}50%{transform:translate(-18px,16px)}100%{transform:translate(16px,8px)} }
    @keyframes pC { 0%{transform:translate(-8px,18px)}50%{transform:translate(18px,-12px)}100%{transform:translate(-4px,26px)} }
    .dash-table th, .dash-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
    .dash-table th { background: #f1f5f9; font-weight: 700; position: sticky; top: 0; }
    .dash-table tr:hover td { background: #f8fafc; }
  </style>

  <script>
// 본인의 firebaseConfig 값으로 교체하세요!
const firebaseConfig = {
  apiKey: "AIzaSyD_tYsBe5wwTP1rxQCeOD_1_uIQyU1EGFs",
  authDomain: "chemeztry-7fa62.firebaseapp.com",
  projectId: "chemeztry-7fa62",
  storageBucket: "chemeztry-7fa62.firebasestorage.app",
  messagingSenderId: "248120227436",
  appId: "1:248120227436:web:380ad7c34e16ac48238a49",
  measurementId: "G-VXXJZZN4SH"
};

// firebase SDK가 정상적으로 로드되었는지 확인 (미리보기/샌드박스 환경에서는
// 외부 CDN(gstatic.com)이 차단되어 firebase가 undefined일 수 있음).
// 이 체크가 없으면 firebase.initializeApp(...)에서 ReferenceError가 발생해
// 스크립트 전체가 멈추고, 이후의 모든 addEventListener 등록도 실행되지 않는다.
let db = null;
let firebaseReady = false;

if (typeof firebase !== 'undefined') {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  } catch (e) {
    console.error('Firebase 초기화 실패:', e);
  }
} else {
  console.warn('[알림] firebase SDK를 불러오지 못했습니다. gstatic.com 접근이 차단된 환경(미리보기 등)일 수 있습니다. 실제 배포(GitHub Pages 등) 환경에서는 정상 작동합니다. 지금은 임시 메모리 저장소로 동작합니다.');
}

// firebase 로드 실패 시를 대비한 임시 메모리 저장소 (배포 환경에서는 사용되지 않음)
const memoryFallback = { records: [], listeners: [] };

window.dataSdk = {
  init: async function(handler) {
    if (firebaseReady) {
      db.collection("submissions").onSnapshot((snapshot) => {
        // 삭제 기능을 위해 각 레코드에 Firestore 문서 ID(_id)를 함께 담아 전달
        const data = snapshot.docs.map(doc => ({ ...doc.data(), _id: doc.id }));
        handler.onDataChanged(data);
      });
    } else {
      // 메모리 폴백: 현재까지 저장된 데이터로 즉시 콜백 실행
      memoryFallback.listeners.push(handler);
      handler.onDataChanged(memoryFallback.records);
    }
    return { isOk: true };
  },
  create: async function(record) {
    if (firebaseReady) {
      try {
        await db.collection("submissions").add(record);
        return { isOk: true };
      } catch (e) {
        console.error(e);
        return { isOk: false };
      }
    } else {
      // 메모리 폴백용 임시 id 부여
      const withId = { ...record, _id: 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2) };
      memoryFallback.records.push(withId);
      memoryFallback.listeners.forEach(h => h.onDataChanged(memoryFallback.records));
      return { isOk: true };
    }
  },
  remove: async function(id) {
    if (firebaseReady) {
      try {
        await db.collection("submissions").doc(id).delete();
        return { isOk: true };
      } catch (e) {
        console.error(e);
        return { isOk: false };
      }
    } else {
      memoryFallback.records = memoryFallback.records.filter(r => r._id !== id);
      memoryFallback.listeners.forEach(h => h.onDataChanged(memoryFallback.records));
      return { isOk: true };
    }
  }
};

    let allRecords = [];
    const TEACHER_ACCESS_CODE = '0406';
    // 학번 규칙: 첫 자리 = 학년, 다음 두 자리 = 반 (예: 10101 → 1학년 01반 01번). 학교 학번 체계가 다르면 이 로직을 맞게 수정하세요.
    const TOTAL_GRADE1_STUDENTS = 98;
    // 반별 정원: 1~5반은 16명, 6반은 17명
    const CLASS_CAPACITY = { 1: 16, 2: 16, 3: 16, 4: 16, 5: 16, 6: 17 };
    function getGrade(studentNumber) {
      const s = String(studentNumber || '').trim();
      return s.charAt(0);
    }
    function getClassNumber(studentNumber) {
      const s = String(studentNumber || '').trim();
      const classPart = s.slice(1, 3);
      const n = parseInt(classPart, 10);
      return Number.isNaN(n) ? null : n;
    }

    // Firestore 실시간 구독 시작 (페이지 로드 시 즉시 실행)
    // 이 호출이 빠져 있으면 submissions 컬렉션 데이터가 allRecords에 절대 채워지지 않는다.
    window.dataSdk.init({
      onDataChanged: function(data) {
        allRecords = data;
        // 교사 대시보드가 이미 열려있는 상태라면 화면도 즉시 갱신
        if (!document.getElementById('dashboardScreen').classList.contains('hidden')) {
          renderDashboard();
        }
      }
    });

    // 대시보드 렌더링
    function renderDashboard() {
      const tbody = document.getElementById('dashboardBody');
      const empty = document.getElementById('emptyDashboard');
      document.getElementById('totalCount').textContent = allRecords.length;

      // 1학년 제출 완료 학생 수: 같은 학생이 여러 번 제출했을 수 있으므로 학번 기준으로 중복 제거
      const grade1UniqueNumbers = new Set(
        allRecords.filter(r => getGrade(r.student_number) === '1').map(r => String(r.student_number).trim())
      );
      const grade1Count = grade1UniqueNumbers.size;
      const grade1Percent = TOTAL_GRADE1_STUDENTS > 0 ? Math.min(100, Math.round((grade1Count / TOTAL_GRADE1_STUDENTS) * 100)) : 0;
      document.getElementById('grade1SubmittedCount').textContent = grade1Count;
      document.getElementById('grade1PercentText').textContent = grade1Percent;
      document.getElementById('grade1ProgressBar').style.width = `${grade1Percent}%`;

      // 반별 제출 학생 수 (학번 기준 중복 제거)
      const grade1Records = allRecords.filter(r => getGrade(r.student_number) === '1');
      const classGrid = document.getElementById('classBreakdownGrid');
      const classFragment = document.createDocumentFragment();
      Object.keys(CLASS_CAPACITY).map(Number).sort((a, b) => a - b).forEach(classNum => {
        const uniqueInClass = new Set(
          grade1Records.filter(r => getClassNumber(r.student_number) === classNum).map(r => String(r.student_number).trim())
        );
        const count = uniqueInClass.size;
        const capacity = CLASS_CAPACITY[classNum];
        const percent = capacity > 0 ? Math.min(100, Math.round((count / capacity) * 100)) : 0;
        const card = document.createElement('div');
        card.className = 'rounded-lg border border-gray-200 p-3 text-center bg-slate-50';
        card.innerHTML = `
          <div class="text-xs font-bold text-gray-500 mb-1">${classNum}반</div>
          <div class="text-xl font-bold text-slate-700">${count}<span class="text-sm text-gray-400 font-medium">/${capacity}</span></div>
          <div class="w-full h-2 rounded-full bg-gray-200 overflow-hidden mt-2">
            <div class="h-full bg-teal-500" style="width:${percent}%"></div>
          </div>
          <div class="text-[11px] text-gray-400 mt-1">${percent}%</div>`;
        classFragment.appendChild(card);
      });
      classGrid.innerHTML = '';
      classGrid.appendChild(classFragment);

      if (!allRecords.length) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      const sorted = [...allRecords].sort((a, b) => (a.student_number || '').localeCompare(b.student_number || '', 'ko'));
      const fragment = document.createDocumentFragment();
      sorted.forEach(r => {
        const tr = document.createElement('tr');
        const time = r.submitted_at ? new Date(r.submitted_at).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
        tr.innerHTML = `
          <td class="font-medium">${esc(r.student_number)}</td>
          <td class="font-medium">${esc(r.student_name)}</td>
          <td>${esc(r.answer_1)}</td>
          <td>${esc(r.answer_2)}</td>
          <td>${esc(r.answer_3)}</td>
          <td class="text-gray-400 text-xs">${time}</td>
          <td><button type="button" class="px-3 py-1.5 rounded-md text-xs font-medium bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 whitespace-nowrap" data-id="${esc(r._id)}" onclick="deleteSubmission(this.dataset.id, '${esc(r.student_name)}')">삭제</button></td>`;
        fragment.appendChild(tr);
      });
      tbody.innerHTML = '';
      tbody.appendChild(fragment);
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    // CSV 필드 이스케이프: 쉼표, 줄바꿈, 큰따옴표가 포함된 경우 큰따옴표로 감싸고
    // 내부의 큰따옴표는 두 번 반복해 이스케이프한다 (RFC 4180 규칙)
    function csvField(value) {
      const s = (value === undefined || value === null) ? '' : String(value);
      if (/[",\n\r]/.test(s)) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    // 학생 제출 데이터를 CSV 파일로 다운로드
    function downloadCSV() {
      if (!allRecords.length) {
        alert('다운로드할 제출 데이터가 없습니다.');
        return;
      }
      const headers = ['학번', '이름', 'Q1. 온도 변화', 'Q2. 일정 유지 구간', 'Q3. 열에너지 사용처', '제출 시간'];
      const sorted = [...allRecords].sort((a, b) => (a.student_number || '').localeCompare(b.student_number || '', 'ko'));
      const rows = sorted.map(r => {
        const time = r.submitted_at ? new Date(r.submitted_at).toLocaleString('ko-KR') : '';
        return [r.student_number, r.student_name, r.answer_1, r.answer_2, r.answer_3, time].map(csvField).join(',');
      });
      const csvContent = [headers.map(csvField).join(','), ...rows].join('\r\n');

      // 엑셀에서 한글이 깨지지 않도록 UTF-8 BOM을 앞에 붙인다
      const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const today = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `물의_가열곡선_제출현황_${today}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    // 학생 데이터 삭제
    async function deleteSubmission(id, name) {
      if (!id) return;
      const ok = confirm(`${name} 학생의 제출 데이터를 삭제할까요?\n삭제하면 되돌릴 수 없습니다.`);
      if (!ok) return;
      const res = await window.dataSdk.remove(id);
      if (!res.isOk) {
        alert('삭제에 실패했습니다. 다시 시도해주세요.');
      }
      // 메모리 폴백 모드에서는 onSnapshot이 없으므로, 성공 시 dataSdk.remove가
      // 내부적으로 리스너들을 호출해 allRecords와 화면을 자동 갱신함
    }

    // 교사 모드 접근 로직
    function requestTeacherAccess() {
      document.getElementById('teacherAccessModal').classList.remove('hidden');
      document.getElementById('teacherAccessCode').focus();
    }
    function closeTeacherAccess() {
      document.getElementById('teacherAccessModal').classList.add('hidden');
      document.getElementById('teacherAccessForm').reset();
      document.getElementById('teacher-access-feedback').textContent = '';
    }
    document.getElementById('teacherAccessForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const feedback = document.getElementById('teacher-access-feedback');
      if (document.getElementById('teacherAccessCode').value.trim() !== TEACHER_ACCESS_CODE) {
        feedback.textContent = '비밀번호가 올바르지 않습니다.';
        document.getElementById('teacherAccessCode').select();
        return;
      }
      closeTeacherAccess();
      showDashboard();
    });

    // 화면 전환 함수들
    function showDashboard() {
      document.getElementById('entryScreen').classList.add('hidden');
      document.getElementById('appScreen').classList.add('hidden');
      document.getElementById('dashboardScreen').classList.remove('hidden');
      renderDashboard();
    }
    function hideDashboard() {
      document.getElementById('dashboardScreen').classList.add('hidden');
      document.getElementById('entryScreen').classList.remove('hidden');
    }
    function goStudentHome() {
      if (timer) clearInterval(timer);
      document.getElementById('appScreen').classList.add('hidden');
      document.getElementById('entryScreen').classList.remove('hidden');
      document.getElementById('entryForm').reset();
      document.getElementById('quiz-feedback').textContent = '';
      document.getElementById('q1').value = '';
      document.getElementById('q2').value = '';
      document.getElementById('q3').value = '';
    }

    // 학생 입장 처리
    document.getElementById('entryForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const num = document.getElementById('studentNumber').value.trim();
      const name = document.getElementById('studentName').value.trim();
      if (!num || !name) { document.getElementById('entry-feedback').textContent = '학번과 이름을 모두 입력해주세요.'; return; }
      currentStudentNumber = num;
      currentStudentName = name;
      document.getElementById('entry-feedback').textContent = '';
      document.getElementById('entryScreen').classList.add('hidden');
      document.getElementById('appScreen').classList.remove('hidden');
      
      // 상태 초기화
      time = 0;
      temperature = -20;
      dataPoints = [];
      updateVisuals(temperature);
      drawGraph();
      requestAnimationFrame(resize);
    });

    // --- 3. 실험 및 그래프 로직 ---
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    const paddingX = 40, paddingY = 30;
    let time = 0, temperature = -20, timer, dataPoints = [];

    function resize() { width = canvas.width = canvas.parentElement.clientWidth; height = canvas.height = 250; drawGraph(); }
    window.addEventListener('resize', resize);
    resize();

    function mapX(t) { return paddingX + (t / 150) * (width - paddingX - 20); }
    function mapY(temp) { return height - paddingY - ((temp + 30) / 160) * (height - paddingY - 20); }

    function drawAxes() {
      ctx.clearRect(0, 0, width, height);
      ctx.beginPath(); ctx.moveTo(paddingX, 10); ctx.lineTo(paddingX, height - paddingY); ctx.lineTo(width - 10, height - paddingY);
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = '#666'; ctx.font = '12px Noto Sans KR';
      ctx.fillText('온도(°C)', 0, 15); ctx.fillText('시간', width - 30, height - 10);
      const y0 = mapY(0), y100 = mapY(100);
      ctx.strokeStyle = '#ddd'; ctx.setLineDash([5, 5]); ctx.beginPath();
      ctx.moveTo(paddingX, y0); ctx.lineTo(width - 10, y0);
      ctx.moveTo(paddingX, y100); ctx.lineTo(width - 10, y100); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillText('0', 22, y0 + 4); ctx.fillText('100', 12, y100 + 4);
    }

    function drawGraph() {
      drawAxes();
      if (!dataPoints.length) return;
      ctx.beginPath(); ctx.moveTo(mapX(dataPoints[0].x), mapY(dataPoints[0].y));
      for (let i = 1; i < dataPoints.length; i++) ctx.lineTo(mapX(dataPoints[i].x), mapY(dataPoints[i].y));
      ctx.strokeStyle = '#d9534f'; ctx.lineWidth = 3; ctx.stroke();
      const last = dataPoints[dataPoints.length - 1];
      ctx.beginPath(); ctx.arc(mapX(last.x), mapY(last.y), 5, 0, Math.PI * 2); ctx.fillStyle = '#0275d8'; ctx.fill();
    }

    function updateVisuals(temp) {
      document.getElementById('tempValue').innerText = Math.round(temp);
      const iceInside = document.getElementById('iceInside');
      const iceScale = time < 20 ? 1 : time < 50 ? 1 - ((time - 20) / 30) * 0.72 : 0.28;
      iceInside.style.transform = `scale(${iceScale})`;
      iceInside.style.opacity = time < 50 && time < 150 ? '1' : '0';
      const liquid = document.getElementById('liquidLevel');
      // 융해 구간에는 물이 늘고, 100°C에 도달하는 기화 구간에는 물이 모두 사라진다.
      const lh = time < 20 ? 0 : time < 50 ? ((time - 20) / 30) * 50 : time < 90 ? 50 : time < 130 ? 50 - ((time - 90) / 40) * 50 : 0;
      liquid.style.height = `${lh}%`;
      liquid.style.opacity = time >= 20 && time < 130 && lh > 0 ? '1' : '0';
      const particleModel = document.getElementById('particleModel');
      const status = document.getElementById('statusText');
      // 100°C를 넘으면 온도에 비례해 수증기 입자의 애니메이션 주기를 줄인다.
      const particleSpeed = Math.max(1.8, 5.5 - Math.max(0, temp - 100) * 0.12);
      particleModel.style.setProperty('--particle-speed', `${particleSpeed}s`);
      particleModel.style.opacity = time >= 90 && time < 150 ? '1' : '0';
      
      if (time < 20) status.innerText = '❄️ 얼음 (고체)';
      else if (time < 50) status.innerText = '🧊💧 얼음 + 물 (융해 중)';
      else if (time < 90) status.innerText = '💧 물 (액체)';
      else if (time < 130) status.innerText = '💧♨️ 물 + 수증기 (기화 중)';
      else status.innerText = '♨️ 수증기 (기체)';
    }

    function startSimulation() {
      document.getElementById('startBtn').disabled = true;
      document.getElementById('startBtn').classList.replace('bg-red-500', 'bg-gray-400');
      document.getElementById('hotplate').classList.remove('off');
      time = 0; temperature = -20; dataPoints = [];
      if (timer) clearInterval(timer);
      timer = setInterval(() => {
        time++;
        if (time <= 20) temperature = -20 + time;
        else if (time <= 50) temperature = 0;
        else if (time <= 90) temperature = (time - 50) * 2.5;
        else if (time <= 130) temperature = 100;
        else if (time <= 150) temperature = 100 + (time - 130);
        dataPoints.push({ x: time, y: temperature });
        drawGraph(); updateVisuals(temperature);
        if (time >= 150) { 
          clearInterval(timer); 
          document.getElementById('hotplate').classList.add('off'); 
          document.getElementById('startBtn').disabled = false;
          document.getElementById('startBtn').classList.replace('bg-gray-400', 'bg-red-500'); 
          document.getElementById('startBtn').innerText = '실험 다시하기';
        }
      }, 150); // 배포용 속도 (조절 가능)
    }

    // --- 4. 정답 제출 로직 ---
    async function checkAnswers() {
      const q1 = document.getElementById('q1').value.trim();
      const q2 = document.getElementById('q2').value.trim();
      const q3 = document.getElementById('q3').value.trim();
      const fb = document.getElementById('quiz-feedback');
      if (!q1 || !q2 || !q3) { fb.style.color = '#ef4444'; fb.innerText = '모든 퀴즈의 답을 서술해주세요!'; return; }

      const btn = document.getElementById('submitQuizBtn');
      btn.disabled = true;
      btn.innerText = '제출 중...';

      // Firestore submissions 컬렉션에 데이터를 저장
      const res = await window.dataSdk.create({
        student_number: currentStudentNumber,
        student_name: currentStudentName,
        answer_1: q1,
        answer_2: q2,
        answer_3: q3,
        submitted_at: new Date().toISOString()
      });

      btn.disabled = false;
      btn.innerText = '정답 제출하기';

      if (res.isOk) {
        // 간단한 키워드 채점 (선생님 참고용)
        let score = 0;
        const n = v => v.replace(/\s/g, '').toLowerCase();
        // Q1: 온도가 일정한 구간(0°C, 100°C)을 언급했는지 확인
        const mentions0 = /0\s*(도|°|℃)/.test(q1);
        const mentions100 = /100\s*(도|°|℃)/.test(q1);
        if (mentions0 && mentions100) score++;
        if (n(q2).includes('상태변화') || n(q2).includes('상태')) score++;
        // Q3: 열에너지가 상태 변화(분자 간 인력/배열 변화)에 쓰인다는 내용을 언급했는지 확인
        const n3 = n(q3);
        if (n3.includes('상태변화') || n3.includes('분자') || n3.includes('인력') || n3.includes('결합') || n3.includes('배열')) score++;
        
        if (score === 3) { fb.style.color = '#16a34a'; fb.innerText = '🎉 완벽해요! 선생님께 제출이 완료되었습니다.'; }
        else { fb.style.color = '#ea580c'; fb.innerText = `👍 제출이 완료되었습니다! (키워드 매칭: ${score}/3)`; }
      } else {
        fb.style.color = '#ef4444'; fb.innerText = '제출에 실패했습니다. 다시 시도해주세요.';
      }
    }
  </script>
